<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Pneumonia Diagnostic Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px;">
                <h1 style="margin: 0;">My Profile</h1>
            </div>
            <p>Manage your account information and security settings.</p>
            <div class="page-links">
                <a href="/" class="btn-outline">Upload</a>
                <a href="/dashboard" class="btn-outline">Dashboard</a>
                <a href="/history" class="btn-outline">History</a>
                <a href="/model" class="btn-outline">Model</a>
                <a href="/logout" class="btn-outline">Logout</a>
            </div>
        </header>

        <main class="card profile-card">
            {% if message %}
            <div class="form-message" style="background: rgba(16, 185, 129, 0.12); color: #059669; border-color: rgba(16, 185, 129, 0.2);">{{ message }}</div>
            {% endif %}
            {% if error %}
            <div class="form-message" style="background: rgba(220, 38, 38, 0.12); color: #dc2626; border-color: rgba(220, 38, 38, 0.2);">{{ error }}</div>
            {% endif %}

            <div class="profile-section">
                <h2>Account Information</h2>
                <div class="info-row">
                    <div class="info-item">
                        <label>Email</label>
                        <p>{{ user_email }}</p>
                    </div>
                    <div class="info-item">
                        <label>Account Created</label>
                        <p>{{ created_date }}</p>
                    </div>
                </div>
            </div>

            <hr>

            <div class="profile-section">
                <h2>Edit Name</h2>
                <form method="post">
                    <input type="hidden" name="action" value="update_info">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" name="name" id="name" value="{{ user_name }}" required>
                    </div>
                    <button type="submit" class="btn-primary">Update Name</button>
                </form>
            </div>

            <hr>

            <div class="profile-section">
                <h2>Change Password</h2>
                <form method="post">
                    <input type="hidden" name="action" value="change_password">
                    <div class="form-group password-group">
                        <label for="old_password">Current Password</label>
                        <div class="password-wrapper">
                            <input type="password" name="old_password" id="old_password" placeholder="Enter current password" required>
                            <button type="button" class="password-toggle" data-target="old_password" aria-label="Show password">👁️</button>
                        </div>
                    </div>
                    <div class="form-group password-group">
                        <label for="new_password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" name="new_password" id="new_password" placeholder="Enter new password" required>
                            <button type="button" class="password-toggle" data-target="new_password" aria-label="Show password">👁️</button>
                        </div>
                    </div>
                    <div class="form-group password-group">
                        <label for="confirm_password">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter new password" required>
                            <button type="button" class="password-toggle" data-target="confirm_password" aria-label="Show password">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Change Password</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                updateThemeButton();
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButton();
        }
        
        function updateThemeButton() {
            const btn = document.querySelector('.theme-toggle');
            if (btn) {
                const isDark = document.body.classList.contains('dark-mode');
                btn.textContent = isDark ? '☀️' : '🌙';
            }
        }
        
        initTheme();
        
        document.querySelectorAll('.password-toggle').forEach(function(button) {
            button.addEventListener('click', function() {
                var targetId = this.getAttribute('data-target');
                var input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = '🙈';
                } else {
                    input.type = 'password';
                    this.textContent = '👁️';
                }
            });
        });
    </script>
</body>
</html>
