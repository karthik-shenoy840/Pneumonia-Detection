<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Pneumonia Diagnostic Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Create Account</h1>
            <p>Register to save your pneumonia scan results and revisit predictions anytime.</p>
        </header>

        <main class="card auth-card">
            <form action="/register" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group password-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" placeholder="Create a password" required>
                        <button type="button" class="password-toggle" data-target="password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group password-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter password" required>
                        <button type="button" class="password-toggle" data-target="confirm_password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Register</button>

                <p class="switch-text">Already registered? <a href="/login">Login here</a></p>

                {% if message %}
                <div class="form-message">{{ message }}</div>
                {% endif %}
            </form>
        </main>
    </div>

    <script>
        document.querySelectorAll('.password-toggle').forEach(function(button) {
            button.addEventListener('click', function() {
                var targetId = this.getAttribute('data-target');
                var input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = '🙈';
                } else {
                    input.type = 'password';
                    this.textContent = '👁️';
                }
            });
        });
    </script>
</body>
</html>
